<!DOCTYPE html>
<html>
<body style="background-color:black; color:#00FF00; font-family:'Courier New', monospace; overflow:hidden; margin:0; padding:10px; font-size:12px;">
    <div id="logs"></div>
    <script>
        const logs = document.getElementById("logs");
        const chars = "0123456789ABCDEF!@#$%^&*()_+{}|:<>?";

        function createBigCode() {
            let line = "";
            for(let i=0; i<100; i++) {
                line += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            logs.innerHTML += line + "<br>";
            window.scrollTo(0, document.body.scrollHeight);
        }

        // کۆدا بێ دوماهی ل سەر شاشێ
        setInterval(createBigCode, 20);

        // پەیامێن ترسناکێن بەردەوام
        setInterval(() => {
            const msgs = ["INTRUSION DETECTED", "ACCESSING CAMERA...", "UPLOADING CONTACTS...", "BYPASSING FIREWALL", "ROOT ACCESS GRANTED"];
            let warning = document.createElement("div");
            warning.style.color = "red";
            warning.style.fontWeight = "bold";
            warning.innerText = "[!] " + msgs[Math.floor(Math.random() * msgs.length)];
            logs.appendChild(warning);
        }, 2000);

        // پەیاما داویێ یا هەمیا دترسیت
        setTimeout(() => {
            alert("FATAL ERROR: Your device is now under remote control. All data has been encrypted.");
            window.location.href = "https://www.google.com"; // دێ ب خۆ چیتە گوگلی داکو باوەر بکەت
        }, 10000);
    </script>
</body>
</html>
